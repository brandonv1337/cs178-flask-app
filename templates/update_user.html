<!doctype html>
<html lang="en">
  <head>
    <title>Update Artist</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="container mt-5">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      <h1>Update Artist</h1>
      <form action="{{ url_for('update_user') }}" method="post">
        <div class="form-group">
          <label for="artist_id">Artist ID:</label>
          <input type="number" id="artist_id" name="artist_id" class="form-control" required />
        </div>
        <div class="form-group">
          <label for="artist_name">Artist Name:</label>
          <input type="text" id="artist_name" name="artist_name" class="form-control" required />
        </div>
        <div class="form-group">
          <label for="track_name">Track Name:</label>
          <input type="text" id="track_name" name="track_name" class="form-control" required />
        </div>
        <div class="form-group">
          <label for="unit_price">Unit Price:</label>
          <input type="number" step="0.01" id="unit_price" name="unit_price" class="form-control" required />
        </div>
        <input type="submit" value="Update" class="btn btn-primary" />
        <a href="{{ url_for('home') }}" class="btn btn-secondary">Cancel</a>
      </form>
    </div>
  </body>
</html>
