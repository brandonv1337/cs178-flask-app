<!DOCTYPE html>
<html lang="en">
<head>
    <title>Artists & Tracks</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h2 class="mt-5">Artists & Tracks</h2>
    <table class="table table-bordered table-striped mt-3">
        <thead class="thead-dark">
            <th>Artist ID</th>
<th>Artist Name</th>
<th>Track Name</th>
<th>Unit Price</th>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user["ArtistId"] }}</td>
                <td>{{ user["ArtistName"] }}</td>
                <td>{{ user["TrackName"] if user["TrackName"] else "N/A" }}</td>
                <td>{{ "$%.2f"|format(user["UnitPrice"]|float) if user["UnitPrice"] else "N/A" }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="{{ url_for('home') }}" class="btn btn-secondary mt-3">Back to Home</a>
</div>
</body>
</html>
