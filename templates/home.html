<!DOCTYPE html>
<html lang="en">
<head>
    <title>Home Page</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <div class="container">
        <h1 class="mt-5">Music Artist Management System</h1>
        <div class="mt-3">
            <a href="/add-user" class="btn btn-primary">Add Artist</a>
            <a href="/delete-user" class="btn btn-danger">Delete Artist</a>
            <a href="/update-user" class="btn btn-secondary">Update Artist</a>
            <a href="/display-users" class="btn btn-info">Display Artists & Tracks</a>
        </div>
    </div>
</body>
</html>
